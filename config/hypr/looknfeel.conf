# Refer to https://wiki.hyprland.org/Configuring/Variables/
# NOTE: This file replaces ~/.local/share/omarchy/default/hypr/looknfeel.conf
# It was created to fix Hyprland 0.55.x compatibility issues:
#   - col.border_locked_* no longer accepts -1 as a color value
#   - dwindle:pseudotile was removed from Hyprland

# $activeBorderColor and $inactiveBorderColor are set by the active theme — do not define them here

scrolling {
    wrap_focus = false
    fullscreen_on_one_column = false
    column_width = 0.825
    focus_fit_method = 1
}

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # gaps, border_size, shadow, blur — controlled by theme via theme-border.conf
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor

    resize_on_border = false
    allow_tearing = false
    layout = scrolling
}

# https://wiki.hypr.land/Configuring/Variables/#group
group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
    col.border_locked_active = $activeBorderColor
    col.border_locked_inactive = $inactiveBorderColor

    groupbar {
        font_size = 12
        font_family = monospace
        font_weight_active = ultraheavy
        font_weight_inactive = normal

        indicator_height = 0
        indicator_gap = 5
        height = 22
        gaps_in = 5
        gaps_out = 0

        text_color = rgb(ffffff)
        text_color_inactive = rgba(ffffff90)
        col.active = rgba(00000040)
        col.inactive = rgba(00000020)

        gradients = true
        gradient_rounding = 0
        gradient_round_only_edges = false
    }
}


# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 3.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    # animation = workspaces, 0, 0, ease
    animation = workspaces, 1, 8, default, slidevert
    animation = workspacesIn, 1, 8, default, slidevert
    animation = workspacesOut, 1, 8, default, slidevert
    animation = specialWorkspace, 1, 3, easeOutQuint, slidevert
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    # pseudotile was removed in Hyprland 0.41+ — use `hyprctl dispatch pseudo` to toggle
    preserve_split = true
    force_split = 2
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering  = true
    disable_scale_notification = true
    focus_on_activate = true
    anr_missed_pings = 3
    on_focus_under_fullscreen = 1
}

# https://wiki.hypr.land/Configuring/Variables/#cursor
cursor {
    hide_on_key_press = true
    warp_on_change_workspace = 1
}

# Auto toggle scratchpad on switching workspace from scratchpad
binds {
    hide_special_on_workspace_change = true
}

# Style Gum confirm to match terminal theme
env = GUM_CONFIRM_PROMPT_FOREGROUND,6       # Cyan
env = GUM_CONFIRM_SELECTED_FOREGROUND,0     # Black
env = GUM_CONFIRM_SELECTED_BACKGROUND,2     # Green
env = GUM_CONFIRM_UNSELECTED_FOREGROUND,7   # White
env = GUM_CONFIRM_UNSELECTED_BACKGROUND,8   # Dark grey

# ─── Your customizations below ────────────────────────────────────────────────
# Uncomment or add overrides here. This file is yours to edit.

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_out = 6

    # Change to niri-like side-scrolling layout
    # layout = scrolling
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    # rounding = 8

    # Dim unfocused windows (0.0 = no dim, 1.0 = fully dimmed)
    # dim_inactive = true
    # dim_strength = 0.15
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    # Disable all animations
    # enabled = no
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}
